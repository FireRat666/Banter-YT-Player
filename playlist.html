<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Banter Video Playlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0;
            font: 16px 'Roboto', sans-serif;
            background: linear-gradient(to bottom, #6a6e83, #332834);
            color: white;
            height: 100%;
            overflow: hidden;
        }
        .header {
            background: #3f3f3f;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .title { font-size: 1.4em; margin-right: 15px; }
        .mode-label { font-size: 0.9em; color: #aaa; margin-left: 10px; }
        .host-bar {
            background: #16181f;
            padding: 8px 15px;
            font-style: italic;
            font-size: 0.95em;
        }
        .controls { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn {
            padding: 8px 12px;
            background: #00b894;
            border: none;
            color: white;
            font-size: 1em;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
        }
        .btn:hover { opacity: 0.9; }
        .btn.red { background: #d63031; }
        .btn.grey { background: #636e72; }
        .btn.locked { background: #27ae60; }
        .btn.blue { background: #0984e3; }

        .playlist-container, .search-results-container {
            flex: 1;
            overflow-y: auto;
            background: linear-gradient(to right, #1e181f, #2b313e);
            padding: 10px;
        }
        .search-results-container {
            display: none; /* Hidden by default */
            background: #2b313e;
        }
        .search-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #333;
            margin-bottom: 10px;
            border-radius: 4px;
        }

        .item {
            display: flex;
            align-items: center;
            background: #3d3d3d;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }
        .item.active { border-left: 4px solid #00b894; background: #4a4a4a; }
        .item-thumb {
            width: 80px;
            height: 60px;
            object-fit: cover;
            background: #222;
            border-radius: 4px;
            flex-shrink: 0;
            z-index: 1;
        }
        .item-info { flex: 1; overflow: hidden; z-index: 1; }
        .item-title {
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-meta { font-size: 0.85em; color: #b2bec3; margin-top: 4px; display: flex; gap: 10px; }
        .item-actions { display: flex; gap: 6px; flex-shrink: 0; z-index: 1; }
        .item-btn {
            padding: 8px 12px;
            background: #555;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .item-btn:hover { background: #666; }
        .item-btn.play { background: #00b894; }
        .item-btn.remove { background: #d63031; }
        .item-btn.move { background: #0984e3; }
        .item-btn.add { background: #00b894; }

        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: #00b894;
            width: 0%;
            transition: width 0.5s linear;
            z-index: 2;
        }

        /* Seek Controls */
        .seek-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: #2d3436;
            border-top: 1px solid #444;
        }
        .seek-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            background: #555;
            border-radius: 3px;
            outline: none;
        }
        .seek-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: #00b894;
            border-radius: 50%;
            cursor: pointer;
        }

        .footer {
            background: #3f3f3f;
            padding: 12px 15px;
            display: flex;
            gap: 10px;
        }
        .footer input {
            flex: 1;
            padding: 12px;
            font-size: 1.1em;
            border: 1px solid #555;
            border-radius: 4px;
            background: #222;
            color: white;
        }
        .footer input::placeholder { color: #888; }
        .empty-msg {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 1.2em;
        }
        /* Layout wrapper */
        .app {
            display: flex;
            flex-direction: column;
            height: 100%;
            /* Padding bottom will be adjusted by JS when logs are shown */
            padding-bottom: 0;
            transition: padding-bottom 0.3s;
        }

        /* On-screen Debug Console */
        #log-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 25%;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            overflow-y: scroll;
            display: flex;
            flex-direction: column-reverse; /* Newest logs on top */
            padding: 5px;
            border-top: 1px solid #555;
            z-index: 9999;
            display: none; /* Hidden by default */
        }
        .log-msg {
            margin-bottom: 2px;
            padding: 2px 4px;
            border-radius: 2px;
            white-space: pre-wrap;
            word-break: break-all;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .log-msg.log { color: #fff; }
        .log-msg.info { color: #8bf; }
        .log-msg.warn { background-color: #ffc107; color: #000; font-weight: bold; }
        .log-msg.error { background-color: #dc3545; color: #fff; font-weight: bold; }

        #copyLogsBtn {
            position: fixed;
            bottom: 25%; /* Aligned with top of log container */
            right: 10px;
            z-index: 10000;
            padding: 4px 8px;
            background: #444;
            color: #fff;
            border: 1px solid #666;
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            font-size: 12px;
            display: none; /* Hidden by default */
        }
        #copyLogsBtn:hover { background: #555; }

        /* Loading Overlay */
        #loadingOverlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            color: white;
            font-size: 1.5em;
        }
    </style>
</head>
<body>
    <div id="loadingOverlay">Searching...</div>
    <div class="app">
        <div class="header">
            <div style="display: flex; align-items: baseline;">
                <span class="title">Video Playlist</span>
                <span class="mode-label" id="modeLabel">Playlist Mode</span>
            </div>
            <div class="controls">
                <button class="btn" id="lockBtn">Unlocked</button>
                <button class="btn blue" id="resyncBtn">Resync</button>
                <button class="btn grey" id="prevBtn">&lt;&lt; Prev</button>
                <button class="btn grey" id="nextBtn">Next &gt;&gt;</button>
                <button class="btn grey" id="toggleLogBtn">Logs</button>
            </div>
        </div>
        <div class="host-bar" id="hostBar">No host</div>

        <div class="seek-controls" id="seekControls" style="display:none;">
            <button class="btn grey" onclick="seekBy(-10)">-10s</button>
            <input type="range" min="0" max="100" value="0" class="seek-slider" id="seekSlider">
            <button class="btn grey" onclick="seekBy(10)">+10s</button>
            <span id="seekTimeDisplay" style="color:#ccc; font-size:0.9em; min-width:80px; text-align:right;">0:00 / 0:00</span>
        </div>

        <div class="playlist-container" id="playlist"></div>

        <div class="search-results-container" id="searchResults">
            <div class="search-header">
                <span>Search Results</span>
                <button class="btn grey" onclick="closeSearch()">Cancel</button>
            </div>
            <div id="resultsList"></div>
        </div>

        <div class="footer">
            <input type="text" id="urlInput" placeholder="Paste YouTube URL or search term...">
            <button class="btn" id="addBtn">Add</button>
        </div>
    </div>

    <button id="copyLogsBtn">Copy Logs</button>
    <div id="log-container"></div>

    <script>
        const logContainer = document.getElementById('log-container');
        const MAX_LOG_ENTRIES = 100;

        // Capture original console methods to prevent recursion
        const originalConsole = {
            log: console.log,
            info: console.info,
            warn: console.warn,
            error: console.error
        };

        // --- On-Screen Debugging ---
        function uiLog(level, ...args) {
            // 1. Format the message
            const message = args.map(arg => {
                if (arg instanceof Error) return arg.stack;
                if (typeof arg === 'object' && arg !== null) {
                    try { return JSON.stringify(arg, null, 2); } catch (e) { return '[Unserializable Object]'; }
                }
                return String(arg);
            }).join(' ');

            // 2. Display in the on-page UI
            const logElement = document.createElement('div');
            logElement.className = `log-msg ${level}`;
            logElement.textContent = message;

            // Insert at the top
            logContainer.insertBefore(logElement, logContainer.firstChild);

            // 3. Trim old log entries
            while (logContainer.children.length > MAX_LOG_ENTRIES) {
                logContainer.removeChild(logContainer.lastChild);
            }

            // 4. Also send to native console
            const logFn = originalConsole[level] || originalConsole.log;
            logFn.apply(console, args);

            // 5. Forward to space script if possible
            if(window.bantermessage) {
                 try {
                    window.bantermessage(JSON.stringify({ type: "LOG", data: `[PlaylistUI] ${message}` }));
                } catch (e) {
                    originalConsole.error("Failed to send log message to space:", e);
                }
            }
        }

        // Override default console methods
        console.log = (...args) => uiLog('log', ...args);
        console.info = (...args) => uiLog('info', ...args);
        console.warn = (...args) => uiLog('warn', ...args);
        console.error = (...args) => uiLog('error', ...args);
        window.onerror = (message, source, lineno, colno, error) => {
            uiLog('error', `Uncaught: ${message}`, error);
        };

        // --- App Logic ---
        console.log("Page loaded");
        console.info("window.bantermessage available:", typeof window.bantermessage === 'function');
        console.info("window.bantermenumessage available:", typeof window.bantermenumessage === 'function');

        // Poll for messaging availability
        const banterCheckInterval = setInterval(() => {
            if (typeof window.bantermessage === 'function' || typeof window.bantermenumessage === 'function') {
                console.info("Messaging API became available asynchronously!");
                clearInterval(banterCheckInterval);
            }
        }, 500);

        let currentState = {
            playlist: [],
            index: 0,
            locked: false,
            hostId: "",
            mode: "playlist",
            startTime: 0,
            pausedAt: 0,
            playing: false
        };
        let myUserId = "";
        let isDraggingSlider = false;

        // Parse URL params
        const urlParams = new URLSearchParams(window.location.search);
        const userParam = urlParams.get('user');
        if (userParam) {
            myUserId = userParam.split('-_-')[0];
        }
        const instanceId = urlParams.get('instance') || 'default-room';
        const mode = urlParams.get('mode') || 'playlist';

        console.info('URL params - instance:', instanceId, 'mode:', mode, 'user:', myUserId);

        document.getElementById('modeLabel').textContent = mode === 'karaoke' ? 'Karaoke Mode' : 'Playlist Mode';

        // Listen for state updates from native script (CustomEvent)
        window.addEventListener("bantermessage", (e) => {
            console.log('Received bantermessage:', e);
            handleMessage(e);
        });

        // Listen for state updates from menu browser (CustomEvent)
        window.addEventListener("bantermenumessage", (e) => {
            console.log('Received bantermenumessage:', e);
            handleMessage(e);
        });

        // Listen for standard window messages (postMessage from in-space browser)
        window.addEventListener("message", (e) => {
            handleMessage(e);
        });

        function handleMessage(e) {
            let msgData = null;

            // 1. Try CustomEvent detail (Banter specific)
            if (e.detail) {
                if (typeof e.detail === 'string') {
                    try { msgData = JSON.parse(e.detail); } catch(e){}
                } else if (e.detail.message && typeof e.detail.message === 'string') {
                    try { msgData = JSON.parse(e.detail.message); } catch(e){}
                }
            }
            // 2. Try MessageEvent data (Standard postMessage)
            else if (e.data) {
                if (typeof e.data === 'string') {
                    try { msgData = JSON.parse(e.data); } catch(e){}
                } else if (typeof e.data === 'object') {
                    msgData = e.data;
                }
            }

            if (!msgData) return;

            // Filter out internal messages or non-app messages
            if (!msgData.type) return;

            console.info('Parsed message type:', msgData.type);
            if (msgData.type === "STATE") {
                currentState = msgData.data;
                console.log('State received, playlist length:', currentState.playlist?.length);
                render();
            }
        }

        // Send command to native script
        function send(type, data) {
            if (data === undefined) data = null;
            console.info('Sending command:', type, data);
            const msg = JSON.stringify({ type, data });

            let sent = false;

            // 1. Prefer bantermenumessage if available (Menu Browser)
            if (typeof window.bantermenumessage === 'function') {
                try {
                    window.bantermenumessage(msg);
                    console.log("Sent via bantermenumessage");
                    sent = true;
                } catch(e) {
                    console.error("Error sending via bantermenumessage:", e);
                }
            }

            // 2. Fallback to bantermessage (In-Space Browser)
            if (!sent && typeof window.bantermessage === 'function') {
                try {
                    window.bantermessage(msg);
                    console.log("Sent via bantermessage");
                    sent = true;
                } catch(e) {
                    console.error("Error sending via bantermessage:", e);
                }
            }

            if (!sent) {
                console.warn("Failed to send message: No messaging function available.");
            }
        }

        // --- UI ---
        document.getElementById('lockBtn').addEventListener('click', () => send('LOCK'));
        document.getElementById('resyncBtn').addEventListener('click', () => send('RESYNC'));
        document.getElementById('prevBtn').addEventListener('click', () => send('PREV'));
        document.getElementById('nextBtn').addEventListener('click', () => send('NEXT'));
        document.getElementById('addBtn').addEventListener('click', () => addVideo());

        const toggleLogBtn = document.getElementById('toggleLogBtn');
        const copyLogsBtn = document.getElementById('copyLogsBtn');

        toggleLogBtn.addEventListener('click', () => {
            const el = document.getElementById('log-container');
            const app = document.querySelector('.app');
            const isHidden = (el.style.display === 'none' || el.style.display === '');

            if (isHidden) {
                el.style.display = 'flex';
                copyLogsBtn.style.display = 'block';
                app.style.paddingBottom = '25%';
            } else {
                el.style.display = 'none';
                copyLogsBtn.style.display = 'none';
                app.style.paddingBottom = '0';
            }
        });

        copyLogsBtn.addEventListener('click', () => {
            const logs = Array.from(logContainer.children)
                .reverse() // DOM is reversed, so reverse back to chronological
                .map(div => div.textContent)
                .join('\n');

            navigator.clipboard.writeText(logs).then(() => {
                const originalText = copyLogsBtn.textContent;
                copyLogsBtn.textContent = 'Copied!';
                setTimeout(() => copyLogsBtn.textContent = originalText, 2000);
            }).catch(err => {
                console.error('Failed to copy logs:', err);
            });
        });

        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addVideo();
        });

        // Slider Logic
        const slider = document.getElementById('seekSlider');
        slider.addEventListener('mousedown', () => isDraggingSlider = true);
        slider.addEventListener('mouseup', () => {
            isDraggingSlider = false;
            send('SEEK_TO', parseFloat(slider.value));
        });
        slider.addEventListener('touchstart', () => isDraggingSlider = true);
        slider.addEventListener('touchend', () => {
            isDraggingSlider = false;
            send('SEEK_TO', parseFloat(slider.value));
        });

        // --- Search Logic ---
        window.closeSearch = function() {
            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('playlist').style.display = 'block';
            document.getElementById('urlInput').value = '';
        }

        window.addSearchResult = function(id, title) {
            send('ADD', { id, title });
            closeSearch();
        }

        async function addVideo() {
            const input = document.getElementById('urlInput');
            const value = input.value.trim();
            if (!value) return;

            // Check if it's a URL or ID
            let id = null;
            try {
                const urlObj = new URL(value);
                if (urlObj.hostname.includes("youtube.com")) id = urlObj.searchParams.get("v");
                else if (urlObj.hostname.includes("youtu.be")) id = urlObj.pathname.slice(1);
            } catch (e) {}

            // If not a URL, treat as search query
            if (!id && !value.match(/^[a-zA-Z0-9_-]{11}$/)) {
                console.log("Searching for:", value);

                // Show loading
                document.getElementById('loadingOverlay').style.display = 'flex';

                try {
                    // Use your CORS proxy with the generic ?url= parameter
                    // Target: api.u2b.cx
                    const targetUrl = `https://api.u2b.cx/search?pool=banter&input=${encodeURIComponent(value)}`;
                    const proxyUrl = `https://cors-netlify-proxy.netlify.app/.netlify/functions/proxy?url=${encodeURIComponent(targetUrl)}`;

                    // Add timeout to fetch
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000); // 10s timeout

                    const response = await fetch(proxyUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        const text = await response.text();
                        console.error(`Proxy error: ${response.status} ${response.statusText}`, text);
                        // Don't alert, just log
                    } else {
                        const data = await response.json();

                        // u2b.cx returns { results: [...] }
                        if (data && data.results && data.results.length > 0) {
                            renderSearchResults(data.results);
                        } else {
                            console.warn("No video results found.");
                        }
                    }
                } catch (err) {
                    console.error("Search failed:", err);
                } finally {
                    // Hide loading
                    document.getElementById('loadingOverlay').style.display = 'none';
                }
            } else {
                // It's a URL or ID
                send('ADD', value);
                input.value = '';
            }
        }

        function renderSearchResults(results) {
            const list = document.getElementById('resultsList');
            list.innerHTML = results.map(vid => `
                <div class="item">
                    <img class="item-thumb" src="https://img.youtube.com/vi/${vid.id}/mqdefault.jpg"
                         onerror="this.src='https://via.placeholder.com/80x60?text=No+Thumb'">
                    <div class="item-info">
                        <div class="item-title">${escapeHtml(vid.title)}</div>
                        <div class="item-meta">
                            <span>${escapeHtml(vid.channel?.name || 'Unknown')}</span>
                            <span>${vid.lengthText || ''}</span>
                        </div>
                    </div>
                    <div class="item-actions">
                        <button class="item-btn add" onclick="addSearchResult('${vid.id}', '${escapeHtml(vid.title).replace(/'/g, "\\'")}')">Add</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('playlist').style.display = 'none';
            document.getElementById('searchResults').style.display = 'block';
        }

        // Expose functions to global scope for inline onclick handlers
        window.playItem = function(index) { send('SET_TRACK', index); }
        window.removeItem = function(index) { send('REMOVE', index); }
        window.seekBy = function(delta) { send('SEEK_BY', delta); }
        window.moveItem = function(index, delta) {
            const newIndex = index + delta;
            if (newIndex < 0 || newIndex >= currentState.playlist.length) return;
            send('MOVE', { from: index, to: newIndex });
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function render() {
            console.log("Rendering UI with state:", currentState);
            const playlist = currentState.playlist || [];
            const currentIndex = currentState.index || 0;
            const isLocked = currentState.locked;
            const isKaraoke = currentState.mode === 'karaoke';

            document.getElementById('lockBtn').textContent = isLocked ? 'Locked' : 'Unlocked';
            document.getElementById('lockBtn').className = isLocked ? 'btn locked' : 'btn red';

            const hostBar = document.getElementById('hostBar');
            hostBar.textContent = isLocked && currentState.hostId ? 'Locked by host' : (isKaraoke ? 'Karaoke Queue' : 'Open playlist');

            // Show/Hide Seek Controls
            const seekControls = document.getElementById('seekControls');
            if (playlist.length > 0) {
                seekControls.style.display = 'flex';
                const vid = playlist[currentIndex];
                if (vid && vid.duration) {
                    document.getElementById('seekSlider').max = vid.duration;
                }
            } else {
                seekControls.style.display = 'none';
            }

            const container = document.getElementById('playlist');
            if (playlist.length === 0) {
                container.innerHTML = '<div class="empty-msg">No videos in playlist. Add one below!</div>';
                return;
            }

            container.innerHTML = playlist.map((vid, idx) => {
                const isActive = idx === currentIndex;
                const durationStr = vid.duration ? formatTime(vid.duration) : '--:--';

                return `
                <div class="item ${isActive ? 'active' : ''}" id="item-${idx}">
                    ${isActive ? '<div class="progress-bar" id="progressBar"></div>' : ''}
                    <img class="item-thumb" src="https://img.youtube.com/vi/${vid.id}/mqdefault.jpg" 
                         onerror="this.src='https://via.placeholder.com/80x60?text=No+Thumb'">
                    <div class="item-info">
                        <div class="item-title">${escapeHtml(vid.title || 'Untitled')}</div>
                        <div class="item-meta">
                            <span>${isKaraoke ? 'Singer: ' : 'Added by '}${escapeHtml(vid.user || 'Unknown')}</span>
                            <span>${durationStr}</span>
                            ${isActive ? '<span id="timeDisplay">0:00</span>' : ''}
                        </div>
                    </div>
                    <div class="item-actions">
                        ${(!isKaraoke || idx === 0) ? `<button class="item-btn play" onclick="playItem(${idx})">Play</button>` : ''}
                        ${idx > 0 ? `<button class="item-btn move" onclick="moveItem(${idx}, -1)">↑</button>` : ''}
                        ${idx < playlist.length - 1 ? `<button class="item-btn move" onclick="moveItem(${idx}, 1)">↓</button>` : ''}
                        <button class="item-btn remove" onclick="removeItem(${idx})">Remove</button>
                    </div>
                </div>
            `}).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        // Progress Bar Loop
        setInterval(() => {
            if (!currentState.playlist.length) return;

            const vid = currentState.playlist[currentState.index];
            if (!vid || !vid.duration) return;

            let elapsed = 0;
            if (currentState.playing) {
                elapsed = (Date.now() - currentState.startTime) / 1000;
            } else {
                elapsed = currentState.pausedAt || 0;
            }

            // Clamp elapsed
            if (elapsed < 0) elapsed = 0;
            if (elapsed > vid.duration) elapsed = vid.duration;

            const progress = Math.min(100, (elapsed / vid.duration) * 100);

            const bar = document.getElementById('progressBar');
            const timeDisplay = document.getElementById('timeDisplay');
            const slider = document.getElementById('seekSlider');
            const seekTimeDisplay = document.getElementById('seekTimeDisplay');

            if (bar) bar.style.width = `${progress}%`;
            if (timeDisplay) timeDisplay.textContent = `${formatTime(elapsed)} / ${formatTime(vid.duration)}`;

            if (seekTimeDisplay) seekTimeDisplay.textContent = `${formatTime(elapsed)} / ${formatTime(vid.duration)}`;

            if (slider && !isDraggingSlider) {
                slider.value = elapsed;
            }
        }, 250);

        // Initial render and state request
        render();
        send('REQUEST_STATE');
    </script>
</body>
</html>
