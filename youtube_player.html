<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouTube Player</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #player {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>
  <div id="player"></div>

  <script>
    let player;
        let currentVideoId = '';
        let targetVolume = 100;
        let isReady = false;

        // --- Remote Debugging & Communication ---
        function debugLog(level, ...args) {
            const message = args.map(arg => {
                if (typeof arg === 'object') {
                    try { return JSON.stringify(arg); } catch (e) { return 'Unserializable Object'; }
                }
                return String(arg);
            }).join(' ');

            const logString = `[YTPlayer][${level.toUpperCase()}] ${message}`;
            console[level](logString); // Log locally just in case
            send('LOG', logString); // Send to space
        }

        function send(type, data) {
            if (window.bantermessage) {
                window.bantermessage(JSON.stringify({ type, data }));
            } else {
                // Cannot debugLog here as it would cause an infinite loop
                console.warn('[YTPlayer] Cannot send message, window.bantermessage is not defined.');
            }
        }

        // --- YouTube IFrame API Setup ---
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);

        window.onYouTubeIframeAPIReady = function() {
            debugLog('info', 'YouTube IFrame API is ready.');
            player = new YT.Player('player', {
                width: '100%',
                height: '100%',
                playerVars: {
                    autoplay: 1, controls: 0, disablekb: 1, fs: 0,
                    modestbranding: 1, rel: 0, showinfo: 0,
                    iv_load_policy: 3, playsinline: 1,
                    origin: window.location.origin
                },
                events: {
                    onReady: onPlayerReady,
                    onStateChange: onPlayerStateChange,
                    onError: onPlayerError
                }
            });
        };

        // Command Queue
        let commandQueue = [];

        // --- Player Event Handlers ---
        function onPlayerReady(event) {
            isReady = true;
            player.setVolume(targetVolume);
            debugLog('info', 'Player is ready.');
            sendStatus('ready');

            // Process any queued commands
            if (commandQueue.length > 0) {
                debugLog('info', `Processing ${commandQueue.length} queued commands.`);
                commandQueue.forEach(msg => handleCommand(msg));
                commandQueue = [];
            }
        }

        function onPlayerStateChange(event) {
            const stateMap = { [-1]:'unstarted', [0]:'ended', [1]:'playing', [2]:'paused', [3]:'buffering', [5]:'cued' };
            const status = stateMap[event.data] || 'unknown';
            debugLog('info', 'Player state changed to:', status);
            sendStatus(status);

            if (event.data === YT.PlayerState.PLAYING) {
                sendVideoInfo();
            }

            if (event.data === YT.PlayerState.ENDED) {
                debugLog('info', 'Video ended, sending VIDEO_ENDED command.');
                send('VIDEO_ENDED');
            }
        }

        function sendVideoInfo() {
            if (!player) return;
            const duration = player.getDuration();
            const data = player.getVideoData();
            const title = data ? data.title : '';

            if (duration && title) {
                debugLog('info', `Sending VIDEO_INFO: ${title} (${duration}s)`);
                send('VIDEO_INFO', { duration, title });
            }
        }

        function onPlayerError(event) {
            debugLog('error', 'YouTube Player Error. Code:', event.data);
            send('VIDEO_ERROR', { code: event.data });
        }

        function sendStatus(status) {
            const statusData = {
                status,
                time: player ? player.getCurrentTime() : 0,
                duration: player ? player.getDuration() : 0
            };
            // This is noisy, so only send if needed for debugging, or keep it light.
            // send('PLAYER_STATUS', statusData);
        }

        // --- Command Handling ---
        window.addEventListener('bantermessage', (e) => {
            let msgString = e.detail;
            if (typeof e.detail !== 'string' && e.detail && e.detail.message) msgString = e.detail.message;
            if (!msgString) return;

            debugLog('info', 'Received bantermessage:', msgString);
            try {
                const msg = JSON.parse(msgString);
                handleCommand(msg);
            } catch (err) {
                debugLog('error', 'Failed to parse incoming command.', err, msgString);
            }
        });

        function handleCommand(msg) {
            if (!msg || !msg.type) return;
            debugLog('info', `Handling command: ${msg.type}`, msg.data || '');

            if (!player || !isReady) {
                debugLog('warn', `Player not ready, queuing command: ${msg.type}`);
                commandQueue.push(msg);
                return;
            }

            switch (msg.type) {
                case 'LOAD_VIDEO':
                    currentVideoId = msg.data.id;
                    if (msg.data.playing) {
                        player.loadVideoById(msg.data.id, msg.data.startTime || 0);
                    } else {
                        player.cueVideoById(msg.data.id, msg.data.startTime || 0);
                    }
                    break;
                case 'PLAY':
                    player.playVideo();
                    break;
                case 'PAUSE':
                    player.pauseVideo();
                    break;
                case 'SET_VOLUME':
                    targetVolume = msg.data;
                    player.setVolume(msg.data);
                    break;
                case 'MUTE':
                    player.mute();
                    break;
                case 'UNMUTE':
                    player.unMute();
                    break;
                case 'SEEK':
                    // Make sure we convert to a number
                    const targetTime = Number(msg.data);
                    if (!isNaN(targetTime)) {
                        player.seekTo(targetTime, true);
                    } else {
                        debugLog('warn', `Invalid seek target: ${msg.data}`);
                    }
                    break;
                case 'GET_TIME':
                    sendStatus(player.getPlayerState() === 1 ? 'playing' : 'paused');
                    break;
            }
        }
  </script>
</body>

</html>
